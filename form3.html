<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Information Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
    }

    table {
        margin: auto;
        width: 90%;
        border-collapse: collapse;
        background: #bfefff;
    }

    td {
        border: 2px solid #666;
        padding: 10px;
        text-align: left;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    input[type="date"],
    select,
    textarea {
        width: 95%;
        padding: 6px;
        font-size: 16px;
    }

    textarea {
        height: 80px;
    }

    .inline {
        display: inline-block;
        margin-right: 15px;
    }

    .buttons {
        text-align: center;
    }

    button {
        padding: 8px 20px;
        font-size: 16px;
        margin: 5px;
        cursor: pointer;
    }

    .note {
        color: red;
        font-size: 18px;
        margin-top: 10px;
    }

    .required {
        color: red;
    }
</style>
</head>
<body>

<h1>Candidate Information</h1>

<form>
<table>
    <tr>
        <td>Name: <span class="required">*</span></td>
        <td><input type="text" required></td>
    </tr>

    <tr>
        <td>Password: <span class="required">*</span></td>
        <td><input type="password" required></td>
    </tr>

    <tr>
        <td>Phone number: <span class="required">*</span></td>
        <td><input type="text" required></td>
    </tr>

    <tr>
        <td>Gender: <span class="required">*</span></td>
        <td>
            <label class="inline"><input type="radio" name="gender"> Male</label>
            <label class="inline"><input type="radio" name="gender"> Female</label>
        </td>
    </tr>

    <tr>
        <td>Date of Birth: <span class="required">*</span></td>
        <td><input type="date" required></td>
    </tr>

    <tr>
        <td>Email: <span class="required">*</span></td>
        <td><input type="email" required></td>
    </tr>

    <tr>
        <td>Highest Qualification: <span class="required">*</span></td>
        <td>
            <select required>
                <option>Select Highest Qualification</option>
                <option>High School</option>
                <option>Diploma</option>
                <option>Graduate</option>
                <option>Post Graduate</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>Courses Interested in: <span class="required">*</span></td>
        <td>
            <label class="inline"><input type="checkbox"> Java</label>
            <label class="inline"><input type="checkbox"> HTML 5</label>
            <label class="inline"><input type="checkbox"> CSS 3</label>
            <label class="inline"><input type="checkbox"> Angular JS</label>
            <label class="inline"><input type="checkbox"> JQuery</label>
        </td>
    </tr>

    <tr>
        <td>Comments: (Mention External Certifications if any)</td>
        <td><textarea></textarea></td>
    </tr>

    <tr>
        <td>Upload Degree / External Certificates: <span class="required">*</span></td>
        <td><input type="file" multiple required></td>
    </tr>

    <tr>
        <td colspan="2" class="buttons">
            <button type="submit">Submit Information</button>
            <button type="reset">Clear</button>
        </td>
    </tr>
</table>
</form>

<div class="note">
    All fields marked (*) are mandatory
</div>

</body>
</html>
